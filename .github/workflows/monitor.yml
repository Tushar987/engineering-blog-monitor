name: Monitor engineering blogs

on:
  schedule:
    # Daily at 13:07 UTC (off-the-hour minute to avoid traffic spikes)
    - cron: "7 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor.py

      - name: Commit updated state and dashboard
        run: |
          git config user.name  "blog-monitor-bot"
          git config user.email "blog-monitor-bot@users.noreply.github.com"
          git add state.json posts.json docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update feeds $(date -u +%Y-%m-%d)"
            git push
          fi
